name: CI Pipeline


on:
  push:
    branches:
      - main
      - Dev

  pull_request:
    branches:
      - main



jobs:

  test:

    runs-on: ubuntu-latest


    steps:


    - name: Checkout code
      uses: actions/checkout@v4



    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"



    - name: Install dependencies
      run: |
        pip install -r my-website/requirements.txt



    - name: Run Unit Tests
      run: |
        pytest my-website/tests



    - name: Build Docker Image
      if: success()
      run: |
        docker build -t devops-demo-app -f docker/Dockerfile .