name: CI Pipeline


on:

  push:
    branches:
      - main
      - Dev

  pull_request:
    branches:
      - main



jobs:


  test:


    runs-on: ubuntu-latest



    steps:


    - name: Checkout code
      uses: actions/checkout@v4



    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"



    - name: Install dependencies
      run: |
        pip install -r my-website/requirements.txt



    - name: Run Unit Tests
      run: |
        cd my-website
        PYTHONPATH=. pytest tests



    - name: Build Docker Image
      if: success()
      run: |
        docker build -t devops-demo-app -f docker/Dockerfile .



    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

        echo deb https://aquasecurity.github.io/trivy-repo/deb \
        $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list

        sudo apt-get update

        sudo apt-get install trivy -y



    # Scan Docker Image
    - name: Scan Docker Image with Trivy
      run: |

        trivy image \
        --severity HIGH,CRITICAL \
        --ignore-unfixed \
        --exit-code 1 \
        devops-demo-app



    - name: Run Docker Container
      run: |
        docker run -d \
        -p 5000:5000 \
        --name devops-container \
        devops-demo-app



    - name: Test Application URL
      run: |
        sleep 5
        curl http://localhost:5000



    - name: Stop Docker Container
      if: always()
      run: |
        docker stop devops-container
