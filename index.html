<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Order Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍔 Online Restaurant</h1>
    <p>Choose your food and add it to the cart</p>
</header>

<section class="menu">

    <div class="item">
        <h3>🍕 Pizza</h3>
        <p>50 EGP</p>
        <button onclick="addToCart('Pizza', 50)">Add to Cart</button>
    </div>

    <div class="item">
        <h3>🍔 Burger</h3>
        <p>40 EGP</p>
        <button onclick="addToCart('Burger', 40)">Add to Cart</button>
    </div>

    <div class="item">
        <h3>🍟 Fries</h3>
        <p>20 EGP</p>
        <button onclick="addToCart('Fries', 20)">Add to Cart</button>
    </div>

</section>

<hr>

<section class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cart-list"></ul>
    <h3 id="total">Total: 0 EGP</h3>
</section>

<script src="script.js"></script>

</body>
</html>
